{% extends "layouts/base.html" %}

{% block content %}
  <h1>Chat de la reserva #{{ booking.id }}</h1>

  <div style="border:1px solid #ddd; padding:12px; margin:12px 0; max-width:720px;">
    {% for m in messages %}
      <div style="margin-bottom:8px;">
        <strong>{{ m.sender }}</strong>:
        <span>{{ m.body }}</span>
        <small style="opacity:.6;">{{ m.created_at }}</small>
      </div>
    {% empty %}
      <p>No hay mensajes todavía.</p>
    {% endfor %}
  </div>

  <form method="post" action="{% url 'messages:send_message' booking.id %}">
    {% csrf_token %}
    <textarea name="body" rows="3" style="width:100%; max-width:720px;" placeholder="Escribe un mensaje..."></textarea>
    <br />
    <button type="submit">Enviar</button>
  </form>
{% endblock %}
