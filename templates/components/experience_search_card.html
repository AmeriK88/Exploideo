{# templates/components/experience_search_card.html #}
<div class="panel-soft p-4 sm:p-6">
  <form method="get" action="{{ action_url }}" class="space-y-3">

    <!-- 1) Search bar (grande, táctil) -->
    <div class="flex items-center gap-3 rounded-2xl bg-white/80 ring-1 ring-slate-200/70 backdrop-blur px-4 py-3 soft-shadow">
      <span class="text-slate-500">
        <!-- lupa -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 104.473 8.73l2.648 2.649a.75.75 0 101.06-1.06l-2.649-2.648A5.5 5.5 0 009 3.5zm-4 5.5a4 4 0 118 0 4 4 0 01-8 0z" clip-rule="evenodd"/>
        </svg>
      </span>

      <input
        class="w-full bg-transparent text-sm sm:text-base text-slate-900 placeholder:text-slate-400 focus:outline-none"
        name="q"
        placeholder="¿A dónde quieres ir? (volcanes, atardecer...)"
      />
    </div>

    <!-- 2) Pills (scroll en móvil, grid en desktop) -->
    <div class="flex gap-2 overflow-x-auto pb-1 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden sm:grid sm:grid-cols-4 sm:gap-3 sm:overflow-visible sm:pb-0">

      <!-- Fechas (si no lo usas aún, lo dejas como pill “dummy” o lo conectas luego) -->
      <button type="button"
        class="shrink-0 inline-flex items-center gap-2 rounded-full bg-white/80 ring-1 ring-slate-200/70 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-white transition">
        <span class="text-slate-500">
          <!-- calendario -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path d="M6 2a1 1 0 012 0v1h4V2a1 1 0 112 0v1h1a2 2 0 012 2v2H3V5a2 2 0 012-2h1V2z"/>
            <path fill-rule="evenodd" d="M3 9h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V9zm3 2a1 1 0 000 2h2a1 1 0 100-2H6z" clip-rule="evenodd"/>
          </svg>
        </span>
        Fechas
      </button>

      <!-- Duración -->
      <div class="shrink-0 inline-flex items-center gap-2 rounded-full bg-white/80 ring-1 ring-slate-200/70 px-4 py-2">
        <span class="text-slate-500">
          <!-- reloj -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-12.5a.75.75 0 00-1.5 0v5c0 .2.08.39.22.53l2.5 2.5a.75.75 0 101.06-1.06l-2.28-2.28V5.5z" clip-rule="evenodd"/>
          </svg>
        </span>
        <input
          class="w-28 bg-transparent text-sm font-semibold text-slate-700 placeholder:text-slate-400 focus:outline-none"
          type="number"
          name="max_duration"
          placeholder="Duración"
        />
        <span class="text-xs text-slate-500">min</span>
      </div>

      <!-- Idioma (si quieres un select mini) -->
      <div class="shrink-0 inline-flex items-center gap-2 rounded-full bg-white/80 ring-1 ring-slate-200/70 px-4 py-2">
        <span class="text-slate-500">🌍</span>
        <select
          name="lang"
          class="bg-transparent text-sm font-semibold text-slate-700 focus:outline-none">
          <option value="">Idioma</option>
          <option value="es">ES</option>
          <option value="en">EN</option>
        </select>
      </div>

      <!-- Filtros (abre modal o expand) -->
      <button type="button"
        class="shrink-0 inline-flex items-center gap-2 rounded-full bg-white/80 ring-1 ring-slate-200/70 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-white transition">
        <span class="text-slate-500">
          <!-- sliders -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path d="M4 6a2 2 0 114 0 2 2 0 01-4 0zM10 6a2 2 0 114 0 2 2 0 01-4 0zM3 6a3 3 0 006 0h8a1 1 0 100-2H9a3 3 0 00-6 0H2a1 1 0 100 2h1zm1 8a2 2 0 114 0 2 2 0 01-4 0zm6 0a2 2 0 114 0 2 2 0 01-4 0zm-7 0a3 3 0 006 0h8a1 1 0 100-2H9a3 3 0 00-6 0H2a1 1 0 100 2h1z"/>
          </svg>
        </span>
        Filtros
      </button>
    </div>

    <!-- 3) Fila inferior: Precio + CTA -->
    <div class="grid gap-3 sm:grid-cols-[1fr_auto]">
      <div class="flex items-center gap-2 rounded-2xl bg-white/80 ring-1 ring-slate-200/70 backdrop-blur px-4 py-3">
        <span class="text-slate-500">€</span>
        <input
          class="w-full bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none"
          type="number"
          step="0.01"
          name="max_price"
          placeholder="Precio máx"
        />
      </div>

      <button class="btn btn-primary w-full sm:w-auto px-5 py-3" type="submit">
        Buscar
      </button>
    </div>

    <!-- 4) Mini “por qué” (más compacto, menos ladrillo) -->
    <div class="rounded-2xl bg-white/70 ring-1 ring-slate-200/70 px-4 py-3">
      <p class="text-sm font-semibold text-slate-900">✨ Experiencias sin buses</p>
      <p class="mt-1 text-sm text-slate-600">
        Sin prisas y a tu ritmo: coche, caminando o bici. Solo tú y el destino.
      </p>
    </div>

  </form>
</div>
