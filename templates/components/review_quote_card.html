
{% with accent=accent|default:"indigo" %}
<figure class="rounded-3xl border border-slate-200 bg-slate-50 p-6">
  <blockquote class="text-sm text-slate-700 leading-relaxed">
    “{{ r.comment }}”
  </blockquote>

  <figcaption class="mt-4 flex items-center gap-3">

    {# Avatar o inicial #}
    {% if r.traveler.traveler_profile.avatar %}
      <img
        src="{{ r.traveler.traveler_profile.avatar.url }}"
        alt="{{ r.traveler.username }}"
        class="h-10 w-10 rounded-2xl object-cover ring-1 ring-slate-200 bg-white"
        loading="lazy"
      >
    {% else %}
      <div class="
        grid h-10 w-10 place-items-center rounded-2xl font-bold
        {% if accent == 'emerald' %}
          bg-emerald-600/10 text-emerald-700
        {% elif accent == 'sky' %}
          bg-sky-600/10 text-sky-700
        {% else %}
          bg-indigo-600/10 text-indigo-700
        {% endif %}
      ">
        {{ r.traveler.username|slice:":1"|upper }}
      </div>
    {% endif %}

    <div class="min-w-0">
      <p class="text-sm font-semibold truncate">
        {{ r.traveler.username }}
        {% if r.experience.location %}
          · {{ r.experience.location }}
        {% endif %}
      </p>
      <p class="text-xs text-slate-500 truncate">
        Viajero · {{ r.experience.title }}
      </p>
    </div>

    <span class="ml-auto shrink-0 inline-flex items-center rounded-full border border-slate-200 bg-white px-2.5 py-1 text-xs font-medium text-slate-700">
      ⭐ {{ r.rating }}/5
    </span>

  </figcaption>
</figure>
{% endwith %}
